name: Generate pacman animation

on:
  schedule: # execute every 12 hours
    - cron: "0 */12 * * *" # Diubah sedikit agar tepat di menit ke-0 setiap 12 jam

  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: generate pacman-contribution-graph.svg
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          # File biasanya akan digenerate di root dengan nama pacman-contribution-graph.svg

      - name: push to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: . # Menggunakan titik (.) karena file berada di direktori utama, bukan di /dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}